name: Greeting

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening an issue! We'll review it soon.
            Make sure to check out the [Contributing Guidelines](https://github.com/rudra496/awesome-ai-humanizers/blob/main/CONTRIBUTING.md).
          pr-message: |
            🎉 Thanks for your first contribution to awesome-ai-humanizers!
            We'll review your PR as soon as possible. Please make sure your entry follows the format used in the README.
